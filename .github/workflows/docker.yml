name: Build and push Docker image

on:
  push:
    branches:
      - main
  schedule:
    # Rebuild weekly on Monday at 04:00 UTC to pick up base-image updates.
    - cron: "0 4 * * 1"

jobs:
  build:
    name: Build multiarch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Generates OCI-compliant image metadata (tags + labels) from the repo
      # context. On a push to main this produces:
      #   kristofkeppens/extronsis-exporter:latest
      #   kristofkeppens/extronsis-exporter:main
      #   kristofkeppens/extronsis-exporter:<short-sha>
      # On a scheduled run the same tags are applied based on the current HEAD.
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: kristofkeppens/extronsis-exporter
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Set up QEMU (cross-platform emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multiarch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in the registry to speed up incremental builds.
          cache-from: type=registry,ref=kristofkeppens/extronsis-exporter:buildcache
          cache-to: type=registry,ref=kristofkeppens/extronsis-exporter:buildcache,mode=max
