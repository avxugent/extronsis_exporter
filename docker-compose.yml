services:
  extronsis-exporter:
    image: kristofkeppens/extronsis-exporter:latest
    container_name: extronsis-exporter
    restart: unless-stopped
    ports:
      - "9877:9877"
    volumes:
      # Optional: mount a custom config to override the built-in default.
      # Remove or comment out this line to use the image's default config.
      - ./config.yaml:/etc/extronsis-exporter/config.yaml:ro
    # Optional: override log level at runtime
    # command: ["--log-level", "DEBUG"]
